# fly.toml — NZ Legislation MCP (Fly.io config)
# App name is set on first `flyctl launch` — feel free to change it.
# Sydney is the closest Fly region to NZ and runs on IPs not flagged by
# legislation.govt.nz's WAF.

app = "nz-legislation-mcp"
primary_region = "syd"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
